<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative flex min-h-screen items-center justify-center bg-cover bg-center bg-no-repeat text-amber-50" style="background-image: url('summer.png');">
  <div class="absolute inset-0 bg-gradient-to-br from-sky-200/65 via-sky-900/30 to-amber-900/25"></div>

  <div id="container" class="relative z-10 w-full max-w-3xl px-4 text-center">
    <div class="rounded-3xl border border-white/25 bg-sky-200/35 px-6 py-8 shadow-2xl backdrop-blur-sm sm:px-10 sm:py-12">
      <h1 id="title" class="mb-6 text-2xl font-bold tracking-wide text-amber-100 drop-shadow-lg sm:mb-8 sm:text-4xl">Countdown to Dainius Vacation start</h1>
      <div id="countdown" class="flex flex-col items-center justify-center gap-4 text-2xl font-mono text-lime-50 drop-shadow-md sm:flex-row sm:gap-6 sm:text-3xl">
        <div>
          <span id="days" class="block text-5xl font-bold text-yellow-100 sm:text-6xl">0</span>
          Days
        </div>
        <div>
          <span id="hours" class="block text-5xl font-bold text-yellow-100 sm:text-6xl">0</span>
          Hours
        </div>
        <div>
          <span id="minutes" class="block text-5xl font-bold text-yellow-100 sm:text-6xl">0</span>
          Minutes
        </div>
        <div>
          <span id="seconds" class="block text-5xl font-bold text-yellow-100 sm:text-6xl">0</span>
          Seconds
        </div>
      </div>
    </div>
  </div>

  <script>
    const firstTarget = new Date('2026-07-10T16:00:00');
    const secondTarget = new Date('2026-07-27T06:00:00');

    const title = document.getElementById('title');
    const container = document.getElementById('container');
    const daysElem = document.getElementById('days');
    const hoursElem = document.getElementById('hours');
    const minutesElem = document.getElementById('minutes');
    const secondsElem = document.getElementById('seconds');

    function updateCountdown() {
      const now = new Date();

      if (now < firstTarget) {
        // Countdown to firstTarget
        updateDisplay(firstTarget, "Countdown to Dainius Vacation start");
      } else if (now >= firstTarget && now < secondTarget) {
        // Countdown to secondTarget
        updateDisplay(secondTarget, "Countdown to Dainius Vacation end");
      } else {
        // Time passed both targets
        container.innerHTML = ''; // Clear everything, display nothing
        clearInterval(interval);
      }
    }

    function updateDisplay(targetDate, headerText) {
      title.textContent = headerText;

      const diff = targetDate - new Date();
      if (diff <= 0) return;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      daysElem.textContent = days.toString();
      hoursElem.textContent = hours.toString().padStart(2, '0');
      minutesElem.textContent = minutes.toString().padStart(2, '0');
      secondsElem.textContent = seconds.toString().padStart(2, '0');
    }

    updateCountdown();
    const interval = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
